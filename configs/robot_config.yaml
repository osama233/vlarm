# ===========================================================================
# VLARM — 机器人配置 (Franka Panda)
# ===========================================================================
#
# 定义 Franka Panda 的关节限制、自由度、状态维度等物理属性。
# 这些值在仿真和真实机器人上保持一致，训练时需要与数据采集时的配置匹配。
#

# ---------------------------------------------------------------------------
# 基本信息
# ---------------------------------------------------------------------------
robot:
  name: "Franka Panda"
  description: "7-DOF arm + 2-finger parallel gripper"
  total_dof: 9                  # 臂 7 + 夹爪 2

# ---------------------------------------------------------------------------
# 关节限制 (弧度，来自巴黎比赛官方配置)
# ---------------------------------------------------------------------------
joint_limits:
  arm:
    low:  [-2.8973, -1.7628, -2.8973, -3.0718, -2.8973, -0.0175, -2.8973]
    high: [ 2.8973,  1.7628,  2.8973, -0.0698,  2.8973,  3.7525,  2.8973]
  gripper:
    low:  [0.0, 0.0]
    high: [0.04, 0.04]

# ---------------------------------------------------------------------------
# 关节索引与名称
# ---------------------------------------------------------------------------
joints:
  arm_names:
    - "panda_joint1"
    - "panda_joint2"
    - "panda_joint3"
    - "panda_joint4"
    - "panda_joint5"
    - "panda_joint6"
    - "panda_joint7"
  gripper_names:
    - "panda_finger_joint1"
    - "panda_finger_joint2"
  arm_indices: [0, 1, 2, 3, 4, 5, 6]       # act[:7]
  gripper_indices: [7, 8]                    # act[7:9]

# ---------------------------------------------------------------------------
# 末端执行器
# ---------------------------------------------------------------------------
ee:
  position_dim: 3              # x, y, z
  orientation_dim: 4            # w, x, y, z (quaternion)
  position_limits:              # 工作空间大致范围
    x: [-0.35, 0.85]
    y: [-0.50, 0.50]
    z: [ 0.00, 0.85]

# ---------------------------------------------------------------------------
# 状态与动作维度（用于模型输入）
# ---------------------------------------------------------------------------
state:
  joint_positions: 9           # 臂 7 + 夹爪 2
  joint_velocities: 9          # 臂 7 + 夹爪 2（数据中有，但模型暂不使用）
  ee_position: 3               # x, y, z
  ee_orientation: 4            # w, x, y, z（数据中有，但模型暂不使用）
  gripper_width: 1             # 标量，从夹爪位置计算
  total: 13                    # 模型实际输入: joint_pos(9) + ee_pos(3) + gripper(1)

action:
  arm: 7                       # 臂关节目标
  gripper: 2                   # 夹爪关节目标
  total: 9                     # = 7 + 2（数据中是 9D，模型预测 7D 臂关节）

# ---------------------------------------------------------------------------
# 控制参数
# ---------------------------------------------------------------------------
control:
  substeps: 10                 # 每个 step 的物理子步数
  ik_solver: "dls"             # 逆运动学求解器: dls, pseudoinverse, svd, transpose
  ik_position_gain: 100.0      # IK 位置增益
  ik_max_iterations: 150       # IK 最大迭代次数
  shelf_margin: 0.02           # 关节限制安全边距（2%）
